<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Le Manoir</title>
    <meta name="description" content="Rogue-lite de plateforme : explore un manoir maudit généré à l'infini, meurs, lègue ton or à un héritier à traits bizarres, recommence plus fort." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏰</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=VT323&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/games/le-manoir/manoir.css" />
  </head>
  <body>
    <canvas id="castle"></canvas>

    <a class="back-link" href="/">← le petit prince</a>

    <div class="hud hidden" id="hud">
      <div class="hud-line" id="hud-hearts">❤️❤️❤️</div>
      <div class="hud-line">🪙 <span id="hud-gold">0</span> · salle <span id="hud-room">1</span></div>
      <div class="hud-line hud-heir" id="hud-heir"></div>
    </div>

    <div class="overlay" id="overlay">
      <h1 id="overlay-title">Le Manoir</h1>
      <p id="overlay-text">Un manoir maudit, généré à l'infini. Ton or survit à ta mort.<br />
      ←→ bouger · ↑/espace sauter · X ou clic frapper.<br />
      Chaque héritier a ses… particularités. Clique pour entrer au manoir.</p>
    </div>

    <div class="manor hidden" id="manor">
      <h2>🏰 Le Manoir — <span id="manor-gold">0</span> 🪙</h2>
      <div class="upgrades" id="upgrades"></div>
      <button id="btn-heirs" type="button">⚰️ Choisir l'héritier →</button>
    </div>

    <div class="manor hidden" id="heirs">
      <h2>⚰️ Qui reprend le flambeau ?</h2>
      <div class="heir-cards" id="heir-cards"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="/src/games/le-manoir/main.ts"></script>
  </body>
</html>
