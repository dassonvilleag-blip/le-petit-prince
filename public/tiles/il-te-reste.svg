<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" shape-rendering="crispEdges">
  <rect x="0" y="0" width="200" height="160" fill="#1fc7a8" />

  <!-- sparkle top-left -->
  <rect x="16" y="14" width="10" height="10" fill="#ff5c8a" transform="rotate(45 21 19)" />
  <!-- sparkle bottom-right -->
  <rect x="168" y="128" width="10" height="10" fill="#ffc93c" transform="rotate(45 173 133)" />

  <!-- hourglass, 7x9 pixel grid, cell = 16 units, offset (44,8) -->
  <!-- row 0: top bar -->
  <rect x="44" y="8" width="16" height="16" fill="#17171b" />
  <rect x="60" y="8" width="16" height="16" fill="#17171b" />
  <rect x="76" y="8" width="16" height="16" fill="#17171b" />
  <rect x="92" y="8" width="16" height="16" fill="#17171b" />
  <rect x="108" y="8" width="16" height="16" fill="#17171b" />
  <rect x="124" y="8" width="16" height="16" fill="#17171b" />
  <rect x="140" y="8" width="16" height="16" fill="#17171b" />

  <!-- row 1: top chamber, wide, mostly empty -->
  <rect x="44" y="24" width="16" height="16" fill="#17171b" />
  <rect x="60" y="24" width="16" height="16" fill="#fffdf4" />
  <rect x="76" y="24" width="16" height="16" fill="#fffdf4" />
  <rect x="92" y="24" width="16" height="16" fill="#fffdf4" />
  <rect x="108" y="24" width="16" height="16" fill="#fffdf4" />
  <rect x="124" y="24" width="16" height="16" fill="#fffdf4" />
  <rect x="140" y="24" width="16" height="16" fill="#17171b" />

  <!-- row 2: top chamber narrowing -->
  <rect x="60" y="40" width="16" height="16" fill="#17171b" />
  <rect x="76" y="40" width="16" height="16" fill="#fffdf4" />
  <rect x="92" y="40" width="16" height="16" fill="#fffdf4" />
  <rect x="108" y="40" width="16" height="16" fill="#fffdf4" />
  <rect x="124" y="40" width="16" height="16" fill="#17171b" />

  <!-- row 3: trickle about to fall -->
  <rect x="76" y="56" width="16" height="16" fill="#17171b" />
  <rect x="92" y="56" width="16" height="16" fill="#ffc93c" />
  <rect x="108" y="56" width="16" height="16" fill="#17171b" />

  <!-- row 4: the neck -->
  <rect x="92" y="72" width="16" height="16" fill="#17171b" />

  <!-- row 5: sand just landed -->
  <rect x="76" y="88" width="16" height="16" fill="#17171b" />
  <rect x="92" y="88" width="16" height="16" fill="#ffc93c" />
  <rect x="108" y="88" width="16" height="16" fill="#17171b" />

  <!-- row 6: bottom chamber widening -->
  <rect x="60" y="104" width="16" height="16" fill="#17171b" />
  <rect x="76" y="104" width="16" height="16" fill="#ffc93c" />
  <rect x="92" y="104" width="16" height="16" fill="#ffc93c" />
  <rect x="108" y="104" width="16" height="16" fill="#ffc93c" />
  <rect x="124" y="104" width="16" height="16" fill="#17171b" />

  <!-- row 7: bottom chamber, full of sand -->
  <rect x="44" y="120" width="16" height="16" fill="#17171b" />
  <rect x="60" y="120" width="16" height="16" fill="#ffc93c" />
  <rect x="76" y="120" width="16" height="16" fill="#ffc93c" />
  <rect x="92" y="120" width="16" height="16" fill="#ffc93c" />
  <rect x="108" y="120" width="16" height="16" fill="#ffc93c" />
  <rect x="124" y="120" width="16" height="16" fill="#ffc93c" />
  <rect x="140" y="120" width="16" height="16" fill="#17171b" />

  <!-- row 8: bottom bar -->
  <rect x="44" y="136" width="16" height="16" fill="#17171b" />
  <rect x="60" y="136" width="16" height="16" fill="#17171b" />
  <rect x="76" y="136" width="16" height="16" fill="#17171b" />
  <rect x="92" y="136" width="16" height="16" fill="#17171b" />
  <rect x="108" y="136" width="16" height="16" fill="#17171b" />
  <rect x="124" y="136" width="16" height="16" fill="#17171b" />
  <rect x="140" y="136" width="16" height="16" fill="#17171b" />
</svg>
